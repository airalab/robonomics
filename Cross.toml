[target.aarch64-unknown-linux-musl]
pre-build = [
  "apt-get update",
  "DEBIAN_FRONTEND=noninteractive apt-get install --assume-yes lsb-release wget software-properties-common gnupg",
  "bash -c \"$(curl https://apt.llvm.org/llvm.sh)\"",
  "DEBIAN_FRONTEND=noninteractive apt-get --assume-yes install protobuf-compiler",
]
