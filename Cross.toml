[target.aarch64-unknown-linux-musl]
pre-build = [
  "bash -c \"$(wget -O - https://apt.llvm.org/llvm.sh)\"",
  "apt-get update",
  "DEBIAN_FRONTEND=noninteractive apt-get --assume-yes install protobuf-compiler",
]
