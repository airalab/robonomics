[target.aarch64-unknown-linux-musl]
pre-build = [
  "add-apt-repository 'deb http://apt.llvm.org/bionic/ llvm-toolchain-bionic main'",
  "apt-get update",
  "DEBIAN_FRONTEND=noninteractive apt-get --assume-yes install protobuf-compiler libclang-dev",
]
