name: Integration Tests

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:
  workflow_call:
    secrets:
      CACHIX_AUTH_TOKEN:
        required: true
    outputs:
      status:
        description: "Status of the cachix builds"
        value: ${{ jobs.robonet-tests.outputs.status }}

permissions:
  contents: read

jobs:
  cachix:
    uses: ./.github/workflows/cachix.yml
    secrets:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}

  robonet-tests:
    needs: cachix
    name: Run Tests
    runs-on: ubuntu-latest
    outputs:
      status: ${{ job.status }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v25
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Run integration tests
        run: nix develop .#robonet --command robonet test --topology asset-hub --timeout 600
